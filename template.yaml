AWSTemplateFormatVersion: "2010-09-09"
Description: Invoice Tax Agent infrastructure

Parameters:
  OpenAIApiKey:
    Type: String
    NoEcho: true
    Description: OpenAI API key

Resources:

  # DynamoDB — stores processed invoice tax results
  InvoiceTaxTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      TableName: invoice-tax-results
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: invoice_id
          AttributeType: S
      KeySchema:
        - AttributeName: invoice_id
          KeyType: HASH

  # S3 — stores uploaded invoice PDFs (private)
  InvoicePdfBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    Properties:
      BucketName: !Sub "invoice-tax-pdfs-${AWS::AccountId}"
      LifecycleConfiguration:
        Rules:
          - Id: expire-old-pdfs
            Status: Enabled
            ExpirationInDays: 90

  # S3 — hosts the static frontend (public)
  FrontendBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    Properties:
      BucketName: invoice-tax-frontend
      WebsiteConfiguration:
        IndexDocument: index.html
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    DeletionPolicy: Retain
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal: "*"
            Action: s3:GetObject
            Resource: "arn:aws:s3:::invoice-tax-frontend/*"

  # SSM — stores OpenAI API key securely
  OpenAIApiKeyParam:
    Type: AWS::SSM::Parameter
    DeletionPolicy: Retain
    Properties:
      Name: /invoice-agent/openai-api-key
      Type: String
      Value: !Ref OpenAIApiKey

  # IAM Role — attached to Lambda
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    DeletionPolicy: Retain
    Properties:
      RoleName: invoice-agent-lambda-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/AmazonDynamoDBFullAccess
        - arn:aws:iam::aws:policy/AmazonS3FullAccess
        - arn:aws:iam::aws:policy/AmazonSSMReadOnlyAccess

  # Lambda — main invoice processing function
  InvoiceLambda:
    Type: AWS::Lambda::Function
    DeletionPolicy: Retain
    Properties:
      FunctionName: invoice-tax-agent
      Runtime: python3.12
      Handler: lambda_handler.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      MemorySize: 512
      Timeout: 60
      Environment:
        Variables:
          OPENAI_API_KEY: !Ref OpenAIApiKey
          DYNAMODB_TABLE: invoice-tax-results
          S3_BUCKET: !Sub "invoice-tax-pdfs-${AWS::AccountId}"
          TAX_RATES_CSV_PATH: tax_rate_by_category.csv
      Code:
        ZipFile: |
          def lambda_handler(event, context):
            return {"statusCode": 200, "body": "placeholder"}

  # API Gateway — REST API
  InvoiceApi:
    Type: AWS::ApiGateway::RestApi
    DeletionPolicy: Retain
    Properties:
      Name: invoice-tax-api
      BinaryMediaTypes:
        - application/pdf
        - image/jpeg
        - image/png

  InvoicesResource:
    Type: AWS::ApiGateway::Resource
    DeletionPolicy: Retain
    Properties:
      RestApiId: !Ref InvoiceApi
      ParentId: !GetAtt InvoiceApi.RootResourceId
      PathPart: invoices

  InvoiceIdResource:
    Type: AWS::ApiGateway::Resource
    DeletionPolicy: Retain
    Properties:
      RestApiId: !Ref InvoiceApi
      ParentId: !Ref InvoicesResource
      PathPart: "{invoice_id}"

  PostMethod:
    Type: AWS::ApiGateway::Method
    DeletionPolicy: Retain
    Properties:
      RestApiId: !Ref InvoiceApi
      ResourceId: !Ref InvoicesResource
      HttpMethod: POST
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${InvoiceLambda.Arn}/invocations"

  GetListMethod:
    Type: AWS::ApiGateway::Method
    DeletionPolicy: Retain
    Properties:
      RestApiId: !Ref InvoiceApi
      ResourceId: !Ref InvoicesResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${InvoiceLambda.Arn}/invocations"

  GetMethod:
    Type: AWS::ApiGateway::Method
    DeletionPolicy: Retain
    Properties:
      RestApiId: !Ref InvoiceApi
      ResourceId: !Ref InvoiceIdResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${InvoiceLambda.Arn}/invocations"

  LambdaApiGatewayPermission:
    Type: AWS::Lambda::Permission
    DeletionPolicy: Retain
    Properties:
      FunctionName: !Ref InvoiceLambda
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${InvoiceApi}/*"

  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DeletionPolicy: Retain
    DependsOn:
      - PostMethod
      - GetListMethod
      - GetMethod
    Properties:
      RestApiId: !Ref InvoiceApi
      StageName: prod

Outputs:
  ApiUrl:
    Value: !Sub "https://${InvoiceApi}.execute-api.${AWS::Region}.amazonaws.com/prod"
    Description: API Gateway invoke URL

  FrontendUrl:
    Value: !Sub "http://invoice-tax-frontend.s3-website-${AWS::Region}.amazonaws.com"
    Description: Frontend S3 website URL
